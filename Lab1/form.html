<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Details Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 150px;
            vertical-align: top;
        }
        .checkbox-group, .radio-group {
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1>Your Personal Details</h1>

    <form action="#" method="post">
        
        <div class="form-group">
            <label for="name">Your name:</label>
            <input type="text" id="name" name="name">
        </div>

        <div class="form-group">
            <label for="student_num">Student number:</label>
            <input type="text" id="student_num" name="student_num">
        </div>

        <div class="form-group">
            <label for="program">Program:</label>
            <select id="program" name="program">
                <option value="bcs_se">Bachelor of Computer Science (Software Engineering) with Honours</option>
                <option value="bcs_cn">Bachelor of Computer Science (Computer Systems & Networking) with Honours</option>
                <option value="bcs_gm">Bachelor of Computer Science (Graphics & Multimedia Technology) with Honours</option>
                <option value="diploma">Diploma in Computer Science</option>
            </select>
        </div>

        <div class="form-group">
            <label>Gender:</label>
            <div class="radio-group">
                <input type="radio" id="male" name="gender" value="male">
                <label style="width: auto;" for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label style="width: auto;" for="female">Female</label>
            </div>
        </div>

        <div class="form-group">
            <label>Hobby:</label>
            <div class="checkbox-group">
                <input type="checkbox" id="reading" name="hobby" value="reading">
                <label style="width: auto;" for="reading">Reading</label><br>
                
                <input type="checkbox" id="swimming" name="hobby" value="swimming">
                <label style="width: auto;" for="swimming">Swimming</label><br>
                
                <input type="checkbox" id="basketball" name="hobby" value="basketball">
                <label style="width: auto;" for="basketball">Playing Basketball</label><br>
                
                <input type="checkbox" id="shopping" name="hobby" value="shopping">
                <label style="width: auto;" for="shopping">Shopping</label>
            </div>
        </div>

        <div class="form-group">
            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" cols="30"></textarea>
        </div>

        <div class="form-group">
            <input type="submit" value="Submit">
            <input type="reset" value="Cancel">
        </div>

    </form>

</body>
</html>
